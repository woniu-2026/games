<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', 'PingFang SC', system-ui, sans-serif;
  overflow: hidden;
}
.wrapper {
  background: linear-gradient(135deg, #111128, #0d0d20);
  border-radius: 24px;
  padding: 30px 35px 35px;
  box-shadow: 0 0 60px rgba(0, 200, 255, 0.08), 0 20px 60px rgba(0,0,0,0.8);
  border: 1px solid rgba(100, 200, 255, 0.08);
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  color: #aac;
}
.header h1 { font-size: 20px; font-weight: 700; background: linear-gradient(90deg,#4af,#4fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
.stats { display: flex; gap: 22px; font-size: 14px; }
.stats span { opacity: 0.7; margin-right: 4px; }
.stats b { font-size: 18px; color: #eef; }
.stats .score-val { color: #4fa; }
.stats .level-val { color: #4af; }
.stats .best-val { color: #fa4; }
.canvas-wrap {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
  background: #0d0d1a;
}
canvas {
  display: block;
  width: 500px;
  height: 500px;
  background: #0d0d1a;
}
.overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  color: #eef;
  transition: opacity 0.3s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.overlay h2 { font-size: 36px; margin-bottom: 8px; }
.overlay .sub { opacity: 0.6; font-size: 14px; margin-bottom: 18px; }
.btn {
  background: linear-gradient(135deg, #2af, #2fa);
  border: none; color: #111; font-weight: 700; font-size: 16px;
  padding: 10px 32px; border-radius: 30px; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 1px;
}
.btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(50,255,170,0.3); }
.controls-hint {
  text-align: center; margin-top: 14px;
  color: #445; font-size: 12px; letter-spacing: 0.5px;
}
.controls-hint kbd {
  display: inline-block; background: #1a1a30; color: #7af;
  padding: 2px 8px; border-radius: 4px; font-size: 11px;
  border: 1px solid #2a2a45; margin: 0 1px;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <h1>🐍 贪吃蛇</h1>
    <div class="stats">
      <div>🏆 <span class="best-val" id="bestDisplay">0</span></div>
      <div>🎯 <b class="score-val" id="scoreDisplay">0</b></div>
      <div>📈 <span>Lv.</span><b class="level-val" id="levelDisplay">1</b></div>
    </div>
  </div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div class="overlay" id="startOverlay">
      <h2>🐍</h2>
      <div class="sub">方向键 / WASD 控制方向 · 空格暂停</div>
      <button class="btn" id="startBtn">开始游戏</button>
    </div>
    <div class="overlay hidden" id="gameOverOverlay">
      <h2>💀 游戏结束</h2>
      <div class="sub" id="finalScoreText">得分: 0</div>
      <button class="btn" id="restartBtn">再来一局</button>
    </div>
  </div>
  <div class="controls-hint">
    <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> · <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> · <kbd>Space</kbd> 暂停
  </div>
</div>

<script>
const GRID_SIZE = 20;
const CELL_SIZE = 25;
const BASE_INTERVAL = 180;
const MIN_INTERVAL = 65;
const SPEED_STEP = 10;
const FOOD_PER_LEVEL = 6;
const OBSTACLE_PER_LEVEL = 2;
const GOLDEN_CHANCE = 0.18;
const GOLDEN_TIMEOUT = 7000;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const levelDisplay = document.getElementById('levelDisplay');
const bestDisplay = document.getElementById('bestDisplay');
const startOverlay = document.getElementById('startOverlay');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const finalScoreText = document.getElementById('finalScoreText');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');

let state = {};

function resetGame() {
  const mid = Math.floor(GRID_SIZE / 2);
  state = {
    snake: [{x: mid, y: mid}, {x: mid - 1, y: mid}, {x: mid - 2, y: mid}],
    direction: {x: 1, y: 0},
    nextDirection: {x: 1, y: 0},
    food: null,
    goldenFood: null,
    goldenTimer: null,
    obstacles: [],
    score: 0,
    level: 1,
    foodEaten: 0,
    best: parseInt(localStorage.getItem('snakeBest')) || 0,
    running: false,
    paused: false,
    gameOver: false,
    intervalId: null,
    particles: []
  };
  spawnFood();
}

function isOccupied(pos) {
  return state.snake.some(s => s.x === pos.x && s.y === pos.y) ||
    state.obstacles.some(o => o.x === pos.x && o.y === pos.y) ||
    (state.goldenFood && state.goldenFood.x === pos.x && state.goldenFood.y === pos.y);
}

function spawnFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random() * GRID_SIZE), y: Math.floor(Math.random() * GRID_SIZE)};
  } while (isOccupied(pos));
  state.food = pos;
}

function getInterval() {
  return Math.max(MIN_INTERVAL, BASE_INTERVAL - (state.level - 1) * SPEED_STEP);
}

function updateDisplay() {
  scoreDisplay.textContent = state.score;
  levelDisplay.textContent = state.level;
  bestDisplay.textContent = state.best;
}

function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    state.particles.push({
      x: x * CELL_SIZE + CELL_SIZE / 2,
      y: y * CELL_SIZE + CELL_SIZE / 2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color: color,
      size: 2 + Math.random() * 4,
      born: performance.now(),
      life: 400 + Math.random() * 200
    });
  }
}

function tick() {
  if (!state.running || state.paused || state.gameOver) return;

  state.direction = {...state.nextDirection};

  const head = state.snake[0];
  const newHead = {x: head.x + state.direction.x, y: head.y + state.direction.y};

  if (newHead.x < 0) newHead.x = GRID_SIZE - 1;
  if (newHead.x >= GRID_SIZE) newHead.x = 0;
  if (newHead.y < 0) newHead.y = GRID_SIZE - 1;
  if (newHead.y >= GRID_SIZE) newHead.y = 0;

  if (state.snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
    gameOver(); return;
  }

  if (state.obstacles.some(o => o.x === newHead.x && o.y === newHead.y)) {
    gameOver(); return;
  }

  let ate = false;
  state.snake.unshift(newHead);

  if (state.food && newHead.x === state.food.x && newHead.y === state.food.y) {
    ate = true;
    addParticles(state.food.x, state.food.y, '#ff4466', 12);
    state.score += 10;
    state.foodEaten++;
    spawnFood();
  }

  if (state.goldenFood && newHead.x === state.goldenFood.x && newHead.y === state.goldenFood.y) {
    ate = true;
    addParticles(state.goldenFood.x, state.goldenFood.y, '#ffcc00', 20);
    state.score += 50;
    if (state.goldenTimer) { clearTimeout(state.goldenTimer); state.goldenTimer = null; }
    state.goldenFood = null;
  }

  if (!ate) {
    state.snake.pop();
  }

  if (state.foodEaten >= FOOD_PER_LEVEL * state.level) {
    state.level++;
    clearInterval(state.intervalId);
    state.intervalId = setInterval(tick, getInterval());
    for (let i = 0; i < OBSTACLE_PER_LEVEL; i++) {
      let pos;
      do {
        pos = {x: Math.floor(Math.random() * GRID_SIZE), y: Math.floor(Math.random() * GRID_SIZE)};
      } while (isOccupied(pos) || (Math.abs(pos.x - state.snake[0].x) < 3 && Math.abs(pos.y - state.snake[0].y) < 3));
      state.obstacles.push(pos);
    }
  }

  if (!state.goldenFood && Math.random() < GOLDEN_CHANCE) {
    let pos;
    do {
      pos = {x: Math.floor(Math.random() * GRID_SIZE), y: Math.floor(Math.random() * GRID_SIZE)};
    } while (isOccupied(pos));
    state.goldenFood = pos;
    state.goldenTimer = setTimeout(() => {
      state.goldenFood = null;
      state.goldenTimer = null;
    }, GOLDEN_TIMEOUT);
  }

  updateDisplay();
}

function gameOver() {
  state.running = false;
  state.gameOver = true;
  if (state.intervalId) { clearInterval(state.intervalId); state.intervalId = null; }
  if (state.goldenTimer) { clearTimeout(state.goldenTimer); state.goldenTimer = null; }
  if (state.score > state.best) {
    state.best = state.score;
    localStorage.setItem('snakeBest', state.best);
  }
  finalScoreText.textContent = `得分: ${state.score}  |  Lv.${state.level}`;
  gameOverOverlay.classList.remove('hidden');
  updateDisplay();
}

document.addEventListener('keydown', (e) => {
  const key = e.key;
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'w', 'W', 'a', 'A', 's', 'S', 'd', 'D'].includes(key)) {
    e.preventDefault();
  }

  if (key === ' ' && state.running) {
    state.paused = !state.paused;
    return;
  }

  if (!state.running || state.paused) return;

  const dirMap = {
    'ArrowUp': {x: 0, y: -1}, 'w': {x: 0, y: -1}, 'W': {x: 0, y: -1},
    'ArrowDown': {x: 0, y: 1}, 's': {x: 0, y: 1}, 'S': {x: 0, y: 1},
    'ArrowLeft': {x: -1, y: 0}, 'a': {x: -1, y: 0}, 'A': {x: -1, y: 0},
    'ArrowRight': {x: 1, y: 0}, 'd': {x: 1, y: 0}, 'D': {x: 1, y: 0}
  };
  const nd = dirMap[key];
  if (nd && (nd.x !== -state.direction.x || nd.y !== -state.direction.y)) {
    state.nextDirection = nd;
  }
});

function draw() {
  ctx.clearRect(0, 0, 500, 500);

  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID_SIZE; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL_SIZE, 0); ctx.lineTo(i * CELL_SIZE, 500); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL_SIZE); ctx.lineTo(500, i * CELL_SIZE); ctx.stroke();
  }

  state.obstacles.forEach(o => {
    const x = o.x * CELL_SIZE, y = o.y * CELL_SIZE;
    ctx.fillStyle = '#885566';
    ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
    ctx.fillStyle = 'rgba(255,100,100,0.2)';
    ctx.beginPath(); ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, 5, 0, Math.PI*2); ctx.fill();
  });

  if (state.food) {
    const fx = state.food.x * CELL_SIZE + CELL_SIZE/2;
    const fy = state.food.y * CELL_SIZE + CELL_SIZE/2;
    const pulse = 1 + 0.1 * Math.sin(performance.now() / 200);
    const r = (CELL_SIZE/2 - 2) * pulse;
    const grad = ctx.createRadialGradient(fx - 2, fy - 2, 0, fx, fy, r);
    grad.addColorStop(0, '#ff6677');
    grad.addColorStop(0.7, '#ee2244');
    grad.addColorStop(1, '#991133');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(fx, fy, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.arc(fx - 3, fy - 4, 3, 0, Math.PI * 2); ctx.fill();
  }

  if (state.goldenFood) {
    const gx = state.goldenFood.x * CELL_SIZE + CELL_SIZE/2;
    const gy = state.goldenFood.y * CELL_SIZE + CELL_SIZE/2;
    const gpulse = 1 + 0.15 * Math.sin(performance.now() / 150);
    const gr = (CELL_SIZE/2 - 1) * gpulse;
    const ggrad = ctx.createRadialGradient(gx - 2, gy - 2, 0, gx, gy, gr);
    ggrad.addColorStop(0, '#ffee44');
    ggrad.addColorStop(0.5, '#ffaa00');
    ggrad.addColorStop(1, '#cc6600');
    ctx.fillStyle = ggrad;
    ctx.beginPath(); ctx.arc(gx, gy, gr, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,200,0.6)';
    ctx.font = '14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('★', gx, gy + 1);
    ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 15;
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath(); ctx.arc(gx, gy, gr + 6, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  state.snake.forEach((s, i) => {
    const x = s.x * CELL_SIZE, y = s.y * CELL_SIZE;
    const padding = i === 0 ? 1 : 2;
    const radius = 4;
    const ratio = 1 - i / state.snake.length;
    const r = Math.floor(50 + 150 * ratio);
    const g = Math.floor(200 + 55 * ratio);
    const b = Math.floor(100 + 50 * ratio);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    const rx = x + padding, ry = y + padding;
    const rw = CELL_SIZE - padding * 2, rh = CELL_SIZE - padding * 2;
    ctx.beginPath();
    ctx.moveTo(rx + radius, ry);
    ctx.lineTo(rx + rw - radius, ry);
    ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + radius);
    ctx.lineTo(rx + rw, ry + rh - radius);
    ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - radius, ry + rh);
    ctx.lineTo(rx + radius, ry + rh);
    ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - radius);
    ctx.lineTo(rx, ry + radius);
    ctx.quadraticCurveTo(rx, ry, rx + radius, ry);
    ctx.closePath();
    ctx.fill();
    if (i === 0) {
      ctx.fillStyle = 'white';
      const ex = x + CELL_SIZE / 2, ey = y + CELL_SIZE / 2;
      ctx.beginPath(); ctx.arc(ex - 5, ey - 4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex + 5, ey - 4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(ex - 5, ey - 4, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex + 5, ey - 4, 1.5, 0, Math.PI * 2); ctx.fill();
    }
  });

  const now = performance.now();
  state.particles = state.particles.filter(p => now - p.born < p.life);
  state.particles.forEach(p => {
    const age = (now - p.born) / p.life;
    const alpha = 1 - age;
    const cx = p.x + p.vx * age * 5;
    const cy = p.y + p.vy * age * 5;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(cx, cy, p.size * (1 - age * 0.5), 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  if (state.paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, 500, 500);
    ctx.fillStyle = '#eef';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⏸ 暂停中', 250, 240);
    ctx.font = '14px sans-serif';
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#88a';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('按 空格键 继续', 250, 290);
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(draw);
}

function startGame() {
  resetGame();
  state.running = true;
  startOverlay.classList.add('hidden');
  gameOverOverlay.classList.add('hidden');
  if (state.intervalId) clearInterval(state.intervalId);
  state.intervalId = setInterval(tick, getInterval());
  updateDisplay();
}

startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);
draw();
</script>
</body>
</html>
